<form nz-form nzLayout="vertical" [formGroup]="addEditForm">
  <div nz-row [nzGutter]="16">
    <div nz-col [nzSpan]="8">
      <nz-form-item>
        <nz-form-label nzRequired>请求方法</nz-form-label>
        <nz-form-control>
          <nz-select formControlName="method">
            @for (opt of methodOptions; track opt.value) {
              <nz-option [nzLabel]="opt.label" [nzValue]="opt.value" />
            }
          </nz-select>
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="16">
      <nz-form-item>
        <nz-form-label nzRequired>API路径</nz-form-label>
        <nz-form-control nzErrorTip="必填，如 /api/users">
          <input formControlName="path" nz-input placeholder="/api/users" />
        </nz-form-control>
      </nz-form-item>
    </div>
    <div nz-col [nzSpan]="24">
      <nz-form-item>
        <nz-form-label>描述</nz-form-label>
        <nz-form-control>
          <textarea formControlName="description" nz-input placeholder="简要描述该API的用途" rows="3"></textarea>
        </nz-form-control>
      </nz-form-item>
    </div>
  </div>
</form>
