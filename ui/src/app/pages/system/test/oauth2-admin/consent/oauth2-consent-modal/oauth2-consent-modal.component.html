<form nz-form [formGroup]="form">
  <nz-form-item>
    <nz-form-label nzRequired>Registered Client ID</nz-form-label>
    <nz-form-control nzErrorTip="必填">
      <input formControlName="registeredClientId" nz-input placeholder="客户端内部 ID（UUID）" />
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label nzRequired>Principal Name</nz-form-label>
    <nz-form-control nzErrorTip="必填">
      <input formControlName="principalName" nz-input placeholder="用户名" />
    </nz-form-control>
  </nz-form-item>
  <nz-form-item>
    <nz-form-label>Authorities / Scopes</nz-form-label>
    <nz-form-control nzExtra="每行一个 scope 或 authority">
      <textarea formControlName="authoritiesText" nz-input placeholder="openid&#10;profile&#10;SCOPE_read" rows="4"></textarea>
    </nz-form-control>
  </nz-form-item>
</form>
