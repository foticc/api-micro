<app-page-header [pageHeaderInfo]="pageHeader" />

<div class="normal-table-wrap">
  <nz-card class="m-b-10" nzHoverable [nzBodyStyle]="{ 'padding-bottom': 0 }">
    <form nz-form>
      <div nz-row [nzGutter]="{ xs: 8, sm: 16, md: 24 }">
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>Client ID</nz-form-label>
            <nz-form-control>
              <input nz-input name="clientId" placeholder="模糊匹配" [(ngModel)]="searchParam.clientId" (keyup.enter)="getDataList({ pageIndex: 1 })" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div nz-col [nzLg]="8" [nzMd]="12" [nzSm]="24" [nzXs]="24">
          <nz-form-item>
            <nz-form-label>客户端名称</nz-form-label>
            <nz-form-control>
              <input nz-input name="clientName" placeholder="模糊匹配" [(ngModel)]="searchParam.clientName" (keyup.enter)="getDataList({ pageIndex: 1 })" />
            </nz-form-control>
          </nz-form-item>
        </div>
        <div class="text-right p-0 m-b-10" nz-col [nzLg]="8" [nzMd]="24" [nzSm]="24" [nzXs]="24">
          <button nz-button nzType="primary" (click)="getDataList({ pageIndex: 1 })">
            <i nz-icon nzType="search"></i>
            搜索
          </button>
          <button class="m-l-15" nz-button (click)="resetSearch()">
            <i nz-icon nzType="close-circle"></i>
            重置
          </button>
        </div>
      </div>
    </form>
  </nz-card>

  <app-card-table-wrap [btnTpl]="tableBtns" [tableTitle]="'客户端列表'" (reload)="reloadTable()">
    <app-ant-table
      [checkedCashArrayFromComment]="checkedCashArray"
      [tableConfig]="tableConfig()"
      [tableData]="dataList()"
      (changePageIndex)="getDataList($event)"
      (changePageSize)="changePageSize($event)"
      (selectedChange)="selectedChecked($event)"
    />
    <ng-template #scopesTpl let-row="$$dataItem">
      <span class="text-ellipsis" [title]="scopesText(row)">{{ scopesText(row) }}</span>
    </ng-template>
    <ng-template #pkceTpl let-row="$$dataItem">
      @if (row.clientSettings?.requireProofKey) {
        <nz-tag nzColor="success">是</nz-tag>
      } @else {
        <nz-tag>否</nz-tag>
      }
    </ng-template>
    <ng-template #issuedAtTpl let-clientIdIssuedAt="clientIdIssuedAt">
      {{ clientIdIssuedAt ? (clientIdIssuedAt | date: 'yyyy-MM-dd HH:mm:ss') : '—' }}
    </ng-template>
    <ng-template #operationTpl let-id="id" let-row="$$dataItem">
      <span class="operate-text" (click)="edit(id)">编辑</span>
      <span class="operate-text" (click)="remove(id, row)">删除</span>
    </ng-template>
  </app-card-table-wrap>
</div>

<ng-template #tableBtns>
  <button class="m-r-8" nz-button nzType="primary" (click)="add()">
    <i nz-icon nzType="plus"></i>
    新增
  </button>
  <button nz-button nzDanger (click)="allDel()">
    <i nz-icon nzType="delete"></i>
    删除
  </button>
</ng-template>
